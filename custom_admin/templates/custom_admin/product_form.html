{% extends 'admin_base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ title }}</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div>
        <label>Product Name:</label>
        <input type="text" name="name" value="{{ product.name|default:'' }}" required>
    </div>

    <div>
        <label>Brand:</label>
        <select name="brand" required>
            <option value="">Select Brand</option>
            {% for brand in brands %}
            <option value="{{ brand.id }}" {% if product.brand.id == brand.id %}selected{% endif %}>
                {{ brand.name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label>Category:</label>
        <select name="category" required>
            <option value="">Select Category</option>
            {% for category in categories %}
            <option value="{{ category.id }}" {% if product.category.id == category.id %}selected{% endif %}>
                {{ category.name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label>Price (KSh):</label>
        <input type="number" step="0.01" name="price" value="{{ product.price|default:'' }}" required>
    </div>

    <div>
        <label>Stock Quantity:</label>
        <input type="number" name="stock" value="{{ product.stock|default:0 }}" required>
    </div>

    <!-- Image Upload Field -->
    <div>
        <label>Product Image:</label>
        {% if product.main_image %}
            <div style="margin-bottom: 10px;">
                <img src="{{ product.main_image.url }}" alt="{{ product.name }}" style="max-width: 200px; max-height: 200px; border-radius: 8px;">
                <p style="font-size: 0.85rem; color: #666;">Current image</p>
            </div>
        {% endif %}
        <input type="file" name="main_image" accept="image/*">
        <small style="display: block; color: #666;">Upload JPG, PNG or GIF. Max size: 5MB</small>
    </div>

    <div>
        <label>Short Description:</label>
        <textarea name="short_description" rows="3">{{ product.short_description|default:'' }}</textarea>
    </div>

    <div>
        <label>Full Description:</label>
        <textarea name="full_description" rows="6">{{ product.full_description|default:'' }}</textarea>
    </div>

    <div style="margin-top: 20px;">
        <button type="submit" class="btn btn-primary">Save Product</button>
        <a href="{% url 'custom_admin:product_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

<style>
    form div {
        margin-bottom: 15px;
    }

    label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        color: #333;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    select,
    textarea {
        width: 100%;
        max-width: 500px;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1rem;
    }

    textarea {
        max-width: 600px;
    }

    small {
        font-size: 0.85rem;
        margin-top: 5px;
    }
</style>
{% endblock %}
