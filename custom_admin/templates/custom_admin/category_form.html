{% extends 'admin_base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="content-card">
    <div class="card-header">
        <h2>{{ title }}</h2>
        <a href="{% url 'custom_admin:category_list' %}" class="btn-primary">Back to Categories</a>
    </div>

    <div style="padding: 24px;">
        <form method="post">
            {% csrf_token %}

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Category Name:</label>
                <input type="text" name="name" value="{{ category.name|default:'' }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Description:</label>
                <textarea name="description" rows="4" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">{{ category.description|default:'' }}</textarea>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn-primary">Save Category</button>
                <a href="{% url 'custom_admin:category_list' %}" class="btn-secondary" style="padding: 8px 16px; text-decoration: none; display: inline-block;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
